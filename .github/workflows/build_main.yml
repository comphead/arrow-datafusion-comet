# Fork-side entry workflow. Fires on push to any branch so that when a
# contributor pushes to a branch in their fork, the fork's GitHub Actions
# quota runs the Spark SQL test matrix. The upstream apache repo only
# bridges this run into PR checks via notify_test_workflow.yml +
# update_build_status.yml.
name: Build

concurrency:
  group: ${{ github.repository }}-${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

on:
  push:
    branches:
    - '**'

jobs:
  call-spark-3-5:
    name: Run (Spark 3.5)
    uses: ./.github/workflows/spark_sql_test_reusable.yml
    with:
      spark-short: '3.5'
      spark-full: '3.5.8'
      java: 11
  call-spark-4-0:
    name: Run (Spark 4.0)
    uses: ./.github/workflows/spark_sql_test_reusable.yml
    with:
      spark-short: '4.0'
      spark-full: '4.0.2'
      java: 21
